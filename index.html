<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111827" />
  <title>Block Pop Mini</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="top-card">
      <div>
        <p class="eyebrow">Telegram Mini App · Ad-ready</p>
        <h1>Block Pop</h1>
      </div>
      <button id="newGameBtn" class="ghost-btn" type="button">新局</button>
    </section>

    <section class="score-grid" aria-label="score board">
      <div class="score-card primary">
        <span>分数</span>
        <strong id="score">0</strong>
      </div>
      <div class="score-card">
        <span>最高</span>
        <strong id="bestScore">0</strong>
      </div>
      <div class="score-card">
        <span>连击</span>
        <strong id="combo">0</strong>
      </div>
    </section>

    <section class="actions hero-actions" aria-label="reward actions">
      <button id="rewardBtn" class="primary-btn reward-cta" type="button">🎁 看广告换一组方块</button>
      <button id="shareBtn" class="secondary-btn" type="button">分享成绩</button>
    </section>

    <section class="board-wrap">
      <canvas id="board" width="720" height="720" aria-label="game board"></canvas>
      <div class="floating-tip" id="floatingTip">拖动方块到棋盘，填满行/列即可消除</div>
    </section>

    <section class="pieces" id="pieces" aria-label="pieces"></section>
  </main>

  <div class="modal hidden" id="gameOverModal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <p class="eyebrow">Game Over</p>
      <h2>没有可放置的方块了</h2>
      <p id="gameOverText">本局得分 0</p>
      <div class="modal-actions">
        <button id="rewardReviveBtn" class="primary-btn" type="button">看激励广告复活</button>
        <button id="restartBtn" class="secondary-btn" type="button">重新开始</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="./game.js"></script>
</body>
</html>
